<!doctype html>
<html lang="en">
  <head>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
    <link rel="preconnect" href="https://unpkg.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./styles.css">

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/SplitText.min.js" defer></script>
    <script src="https://unpkg.com/lenis@1.1.13/dist/lenis.min.js" defer></script>
    <script src="./loader.js" defer></script>
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js",
          "three/addons/loaders/STLLoader.js": "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/loaders/STLLoader.js"

  <body>
    <script>document.body.style.overflow = 'hidden';</script>

    <div id="loader" aria-live="polite">
      <div id="loader-number"></div>
      <div id="loader-title"></div>
    </div>

    <div id="top-left" class="corner">CLE 10 CAPSTONE</div>
    <div id="top-right" class="corner">PERSONAL ARCHIVE</div>
    <div id="bottom-left" class="corner">FUTURE PLAN</div>
    <div id="bottom-right" class="corner">JOVAN PAHAL</div>

    <canvas id="hero-canvas" aria-hidden="true"></canvas>
    <div id="hero-vignette" aria-hidden="true"></div>
    <div id="cursor-light" aria-hidden="true"></div>
    <div id="wipe" aria-hidden="true"></div>

    <main id="story-stage" aria-label="The Future I'm Building scroll story"></main>

    <aside id="scene-counter" aria-live="polite">
      <span id="scene-current">01</span>
      <span id="scene-total">22</span>
    </aside>

    <div id="cursor-text" aria-hidden="true"></div>

    <script type="module" src="./app.js"></script>
